name: mirage
channels:
  - conda-forge
variables:
  PYTHONPATH: src
dependencies:
  - python=3.12
  - pip
  - setuptools
  - wheel
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.9.1
      - torchvision==0.24.1
      - accelerate>=1.12.0
      - hydra-core>=1.3.2
      - wandb[media]>=0.25.1
      - tqdm
      - easydict>=1.13
      - lmdb>=1.7.5
      - numpy
      - pillow
      - peft>=0.18.1
      - diffusers>=0.36.0
      - transformers>=4.57.6
      - ftfy>=6.3.1
      - regex
      - safetensors
      - jaxtyping>=0.3.7
      - einops>=0.8.2
      - https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3+cu12torch2.9cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
